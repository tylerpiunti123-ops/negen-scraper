<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nexgen Closers AI — CRM</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:system-ui,sans-serif;}
  input,select,textarea,button{font-family:system-ui,sans-serif;outline:none;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef}=React;

const STAGES=["New","Contacted","Follow Up","Interested","Booked","Closed","Dead"];
const STAGE_COLORS={New:"#378ADD",Contacted:"#BA7517","Follow Up":"#D85A30",Interested:"#639922",Booked:"#7F77DD",Closed:"#1D9E75",Dead:"#888780"};
const STAGE_BG={New:"#E6F1FB",Contacted:"#FAEEDA","Follow Up":"#FAECE7",Interested:"#EAF3DE",Booked:"#EEEDFE",Closed:"#E1F5EE",Dead:"#F1EFE8"};
const DIALER_OUTCOMES=["Answered – Interested","Answered – Not Interested","Voicemail","No Answer","Wrong Number","Callback Requested","Called Off"];
const FOLDER_COLORS=["#534AB7","#1D9E75","#D85A30","#BA7517","#378ADD","#A32D2D","#639922","#7F77DD","#888780","#e91e8c"];

function sc(s){return STAGE_COLORS[s]||"#888";}
function sb(s){return STAGE_BG[s]||"#eee";}
function makeDm(dark){return{bg:dark?"#0f1117":"#f5f5f7",card:dark?"#1a1d27":"#ffffff",card2:dark?"#22263a":"#f0f0f2",border:dark?"#2e3347":"#e0e0e5",text:dark?"#e8eaf0":"#111111",ts:dark?"#8b90a8":"#555566",tt:dark?"#5a5f78":"#888899",nav:dark?"#13161f":"#ffffff",navB:dark?"#22263a":"#e5e5ea",inp:dark?"#1a1d27":"#ffffff",inpB:dark?"#2e3347":"#d0d0d8"};}
function hsh(s){var h=0;for(var i=0;i<s.length;i++){h=Math.imul(31,h)+s.charCodeAt(i)|0;}return h.toString(16);}
function getUsers(){try{return JSON.parse(localStorage.getItem("ngc_users")||"[]");}catch(e){return[];}}
function saveUsers(u){localStorage.setItem("ngc_users",JSON.stringify(u));}
function getSession(){return localStorage.getItem("ngc_session")||null;}
function setSession(e){localStorage.setItem("ngc_session",e);}
function clearSession(){localStorage.removeItem("ngc_session");}
function uk(email,key){return"u_"+hsh(email)+"_"+key;}

function Overlay(p){return <div onClick={p.onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16}}><div onClick={function(e){e.stopPropagation();}}>{p.children}</div></div>;}
function StageBadge(p){return <span style={{background:sb(p.s),color:sc(p.s),fontSize:11,fontWeight:600,padding:"2px 8px",borderRadius:99,border:"0.5px solid "+sc(p.s)+"44"}}>{p.s}</span>;}
function Avatar(p){var n=(p.name||"?").split(" ").map(function(w){return w[0];}).slice(0,2).join("").toUpperCase();var sz=p.size||36;return <div style={{width:sz,height:sz,borderRadius:"50%",background:"#2d2a5e",display:"flex",alignItems:"center",justifyContent:"center",fontSize:sz*0.35,fontWeight:700,color:"#a89fff",flexShrink:0}}>{n}</div>;}
function ScoreRing(p){if(p.score==null)return null;var c=p.score>=75?"#1D9E75":p.score>=50?"#BA7517":p.score>=25?"#D85A30":"#A32D2D";var bg=p.score>=75?"#E1F5EE":p.score>=50?"#FAEEDA":p.score>=25?"#FAECE7":"#FCEBEB";return <div style={{width:42,height:42,borderRadius:"50%",background:bg,border:"2px solid "+c,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><span style={{fontSize:12,fontWeight:700,color:c}}>{p.score}</span></div>;}

function KanbanCard(p){
  var l=p.l;var dm=p.dm;
  var [moving,setMoving]=useState(false);
  var [editing,setEditing]=useState(false);
  var [nv,setNv]=useState(l.notes||"");
  function move(e,st){e.stopPropagation();p.updateLead(l.id,{stage:st});setMoving(false);}
  function saveNote(e){e.stopPropagation();p.updateLead(l.id,{notes:nv});setEditing(false);}
  return(
    <div style={{background:dm.card,borderRadius:10,border:"0.5px solid "+dm.border,padding:"10px 12px",marginBottom:8,position:"relative"}}>
      <div onClick={function(){p.onOpen(l.id);}} style={{cursor:"pointer",marginBottom:8}}>
        <p style={{fontSize:13,fontWeight:700,margin:"0 0 2px",color:dm.text}}>{l.name}</p>
        <p style={{fontSize:11,color:dm.ts,margin:"0 0 2px"}}>{l.phone||"No phone"}</p>
        {l.rating&&<p style={{fontSize:11,color:"#f5b942",margin:"0 0 2px"}}>⭐ {l.rating} ({l.reviewCount||0} reviews)</p>}
        {l.website?<a href={"https://"+l.website} target="_blank" rel="noreferrer" onClick={function(e){e.stopPropagation();}} style={{fontSize:11,color:"#6b8cff",display:"block",margin:"0 0 2px",wordBreak:"break-all"}}>{l.website}</a>:<p style={{fontSize:11,color:"#cc3333",margin:"0 0 2px",fontStyle:"italic"}}>No website</p>}
        {l.address&&<p style={{fontSize:10,color:dm.tt,margin:0}}>{l.address}</p>}
        {l.mapsUrl&&<a href={l.mapsUrl} target="_blank" rel="noreferrer" onClick={function(e){e.stopPropagation();}} style={{fontSize:10,color:"#6b8cff",display:"block",marginTop:2}}>View on Maps →</a>}
      </div>
      <div style={{marginBottom:6}} onClick={function(e){e.stopPropagation();}}>
        {editing?(
          <div>
            <textarea value={nv} onChange={function(e){setNv(e.target.value);}} rows={3} autoFocus style={{width:"100%",fontSize:11,padding:"5px 7px",borderRadius:8,border:"0.5px solid #534AB7",background:dm.inp,color:dm.text,resize:"vertical",fontFamily:"system-ui,sans-serif",boxSizing:"border-box",lineHeight:1.5}}/>
            <div style={{display:"flex",gap:4,marginTop:4}}>
              <button onClick={saveNote} style={{flex:1,fontSize:10,padding:"3px 6px",borderRadius:8,border:"none",background:"#534AB7",color:"#fff",cursor:"pointer",fontWeight:700}}>Save</button>
              <button onClick={function(e){e.stopPropagation();setEditing(false);setNv(l.notes||"");}} style={{fontSize:10,padding:"3px 6px",borderRadius:8,border:"0.5px solid "+dm.border,background:"transparent",color:dm.ts,cursor:"pointer"}}>Cancel</button>
            </div>
          </div>
        ):(
          <div onClick={function(e){e.stopPropagation();setEditing(true);}} style={{minHeight:32,background:dm.card2,borderRadius:8,padding:"5px 8px",cursor:"text",border:"0.5px solid "+dm.border}}>
            {l.notes?<p style={{fontSize:11,color:dm.ts,margin:0,lineHeight:1.5,whiteSpace:"pre-wrap"}}>{l.notes}</p>:<p style={{fontSize:11,color:dm.tt,margin:0,fontStyle:"italic"}}>Add a note...</p>}
          </div>
        )}
      </div>
      <div style={{display:"flex",gap:4,alignItems:"center"}}>
        <button onClick={function(e){e.stopPropagation();setMoving(function(v){return !v;});}} style={{flex:1,fontSize:10,padding:"3px 6px",borderRadius:8,border:"0.5px solid "+sc(l.stage),background:sb(l.stage),color:sc(l.stage),fontWeight:700,cursor:"pointer",textAlign:"left"}}>{l.stage} ▾</button>
        <button onClick={function(e){e.stopPropagation();p.onDial(l.id);}} style={{fontSize:10,padding:"2px 6px",borderRadius:99,border:"0.5px solid "+dm.border,background:"transparent",cursor:"pointer",color:dm.ts}}>📞</button>
        <button onClick={function(e){e.stopPropagation();p.onBook(l.id);}} style={{fontSize:10,padding:"2px 6px",borderRadius:99,border:"0.5px solid "+dm.border,background:"transparent",cursor:"pointer",color:dm.ts}}>📅</button>
        <button onClick={function(e){e.stopPropagation();p.onFolder(l);}} style={{fontSize:10,padding:"2px 6px",borderRadius:99,border:"0.5px solid "+dm.border,background:"transparent",cursor:"pointer",color:dm.ts}}>📁</button>
      </div>
      {moving&&(
        <div style={{position:"absolute",top:"100%",left:0,zIndex:50,background:dm.card,border:"0.5px solid "+dm.border,borderRadius:10,padding:"4px",marginTop:2,width:"100%",boxShadow:"0 4px 16px rgba(0,0,0,0.2)"}}>
          {STAGES.filter(function(st){return st!==l.stage;}).map(function(st){return <div key={st} onClick={function(e){move(e,st);}} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 8px",borderRadius:8,cursor:"pointer",background:sb(st),marginBottom:2}} onMouseEnter={function(e){e.currentTarget.style.opacity="0.8";}} onMouseLeave={function(e){e.currentTarget.style.opacity="1";}}><span style={{width:8,height:8,borderRadius:"50%",background:sc(st),display:"inline-block"}}/><span style={{fontSize:12,color:sc(st),fontWeight:700}}>{st}</span></div>;})}
        </div>
      )}
    </div>
  );
}

function AuthScreen(p){
  var dm=p.dm;
  var [mode,setMode]=useState("login");
  var [email,setEmail]=useState("");
  var [pass,setPass]=useState("");
  var [name,setName]=useState("");
  var [err,setErr]=useState("");
  var inp={width:"100%",background:dm.inp,color:dm.text,border:"0.5px solid "+dm.inpB,borderRadius:10,padding:"10px 14px",fontSize:14,boxSizing:"border-box",marginBottom:12,fontFamily:"system-ui,sans-serif"};
  function login(){setErr("");var u=getUsers().find(function(u){return u.email===email.toLowerCase().trim();});if(!u){setErr("No account found.");return;}if(u.passHash!==hsh(pass)){setErr("Incorrect password.");return;}setSession(u.email);p.onAuth(u.email);}
  function signup(){setErr("");if(!name.trim()){setErr("Enter your name.");return;}if(!email.includes("@")){setErr("Enter a valid email.");return;}if(pass.length<6){setErr("Password must be 6+ characters.");return;}var users=getUsers();if(users.find(function(u){return u.email===email.toLowerCase().trim();})){setErr("Account already exists.");return;}var nu={email:email.toLowerCase().trim(),name:name.trim(),passHash:hsh(pass)};saveUsers(users.concat([nu]));setSession(nu.email);p.onAuth(nu.email);}
  return(
    <div style={{minHeight:"100vh",background:dm.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:dm.card,borderRadius:16,border:"0.5px solid "+dm.border,width:"min(400px,100%)",padding:"2rem"}}>
        <div style={{textAlign:"center",marginBottom:28}}><p style={{fontSize:32,margin:"0 0 6px"}}>⚡</p><p style={{fontWeight:700,fontSize:20,color:dm.text,margin:"0 0 4px"}}>Nexgen Closers AI</p><p style={{fontSize:13,color:dm.ts,margin:0}}>{mode==="login"?"Sign in to your account":"Create your free account"}</p></div>
        {mode==="signup"&&<input value={name} onChange={function(e){setName(e.target.value);}} placeholder="Full name" style={inp}/>}
        <input value={email} onChange={function(e){setEmail(e.target.value);}} placeholder="Email address" type="email" style={inp}/>
        <input value={pass} onChange={function(e){setPass(e.target.value);}} placeholder="Password" type="password" style={inp} onKeyDown={function(e){if(e.key==="Enter"){mode==="login"?login():signup();}}}/>
        {err&&<p style={{fontSize:12,color:"#ff6b6b",marginBottom:12,textAlign:"center"}}>{err}</p>}
        <button onClick={mode==="login"?login:signup} style={{width:"100%",padding:"11px",borderRadius:10,border:"none",background:"#534AB7",color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer",marginBottom:14}}>{mode==="login"?"Sign In":"Create Account"}</button>
        <p style={{textAlign:"center",fontSize:13,color:dm.ts,margin:0}}>{mode==="login"?"No account? ":"Have an account? "}<span onClick={function(){setMode(mode==="login"?"signup":"login");setErr("");}} style={{color:"#6b8cff",cursor:"pointer",fontWeight:700}}>{mode==="login"?"Sign up":"Sign in"}</span></p>
      </div>
    </div>
  );
}

function App(){
  var [user,setUser]=useState(function(){return getSession();});
  var [dark,setDark]=useState(function(){return localStorage.getItem("ngc_dark")==="1";});
  var dm=makeDm(dark);
  if(!user)return <AuthScreen dm={dm} onAuth={function(e){setUser(e);}}/>;
  return <CRM key={user} user={user} dark={dark} setDark={setDark} dm={dm} onLogout={function(){clearSession();setUser(null);}}/>;
}

function CRM(p){
  var user=p.user;var dm=p.dm;
  var [leads,setLeads]=useState(function(){try{var s=localStorage.getItem(uk(user,"leads"));return s?JSON.parse(s):[];}catch(e){return[];}});
  var [folders,setFolders]=useState(function(){try{var s=localStorage.getItem(uk(user,"folders"));return s?JSON.parse(s):[{id:"all",name:"All Leads",color:"#534AB7"}];}catch(e){return[{id:"all",name:"All Leads",color:"#534AB7"}];}});
  var [activeFolder,setActiveFolder]=useState("all");
  var [tab,setTab]=useState("dashboard");
  var [view,setView]=useState("kanban");
  var [search,setSearch]=useState("");
  var [fs,setFs]=useState("All");
  var [hasNotes,setHasNotes]=useState(!!localStorage.getItem(uk(user,"notes")));
  var [folderModal,setFolderModal]=useState(false);
  var [moveFolderLead,setMoveFolderLead]=useState(null);
  var [selId,setSelId]=useState(null);
  var [dialId,setDialId]=useState(null);
  var [dialOpen,setDialOpen]=useState(false);
  var [calId,setCalId]=useState(null);
  var [calOpen,setCalOpen]=useState(false);

  var selLead=selId?(leads.find(function(l){return l.id===selId;})||null):null;
  var dialLead=dialId?(leads.find(function(l){return l.id===dialId;})||null):null;
  var calLead=calId?(leads.find(function(l){return l.id===calId;})||null):null;

  function savL(next){try{localStorage.setItem(uk(user,"leads"),JSON.stringify(next));}catch(e){}setLeads(next);}
  function savF(next){try{localStorage.setItem(uk(user,"folders"),JSON.stringify(next));}catch(e){}setFolders(next);}
  function updateLead(id,patch){savL(leads.map(function(l){return l.id===id?Object.assign({},l,patch):l;}));}
  function addLeadsBulk(arr){var now=new Date().toISOString().slice(0,10);savL(leads.concat(arr.map(function(l,i){return Object.assign({},l,{id:Date.now()+i+Math.random(),calls:[],appointments:[],scraped:now,stage:"New",notes:"",folderId:activeFolder});})));}
  function deleteLead(id){savL(leads.filter(function(l){return l.id!==id;}));setSelId(null);}
  function addFolder(name,color){savF(folders.concat([{id:"f_"+Date.now(),name:name,color:color||"#534AB7"}]));}
  function deleteFolder(id){savF(folders.filter(function(f){return f.id!==id;}));savL(leads.map(function(l){return l.folderId===id?Object.assign({},l,{folderId:"all"}):l;}));if(activeFolder===id)setActiveFolder("all");}
  function moveToFolder(leadId,fid){savL(leads.map(function(l){return l.id===leadId?Object.assign({},l,{folderId:fid}):l;}));setMoveFolderLead(null);}
  function toggleDark(){var n=!p.dark;p.setDark(n);localStorage.setItem("ngc_dark",n?"1":"0");}

  var totalCalls=leads.reduce(function(s,l){return s+(l.calls||[]).length;},0);
  var booked=leads.filter(function(l){return l.stage==="Booked"||l.stage==="Closed";}).length;
  var allAppts=leads.flatMap(function(l){return(l.appointments||[]).map(function(a){return Object.assign({},a,{leadName:l.name});});});
  var todayAppts=allAppts.filter(function(a){return a.date===new Date().toISOString().slice(0,10);});

  return(
    <div style={{fontFamily:"system-ui,sans-serif",minHeight:"100vh",background:dm.bg}}>
      <div style={{background:dm.nav,borderBottom:"0.5px solid "+dm.navB,padding:"0 1.5rem",display:"flex",alignItems:"center",gap:10,height:52}}>
        <span style={{fontWeight:700,fontSize:15,color:dm.text,flexShrink:0}}>⚡ Nexgen Closers AI</span>
        <div style={{display:"flex",gap:2,overflowX:"auto",flex:1}}>
          {["dashboard","leads","calendar","scraper","calendly","notes"].map(function(t){var dot=t==="notes"&&hasNotes;return <button key={t} onClick={function(){setTab(t);}} style={{padding:"4px 12px",borderRadius:8,border:"none",background:tab===t?dm.card2:"transparent",color:tab===t?dm.text:dm.ts,fontWeight:tab===t?700:400,fontSize:13,cursor:"pointer",textTransform:"capitalize",position:"relative",whiteSpace:"nowrap"}}>{t}{dot&&<span style={{position:"absolute",top:4,right:3,width:6,height:6,borderRadius:"50%",background:"#534AB7"}}/>}</button>;})}
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0}}>
          <button onClick={toggleDark} style={{background:"transparent",border:"0.5px solid "+dm.border,borderRadius:8,padding:"4px 9px",cursor:"pointer",fontSize:14}}>{p.dark?"☀️":"🌙"}</button>
          <button onClick={function(){setTab("scraper");}} style={{background:"#534AB7",color:"#fff",border:"none",borderRadius:8,padding:"6px 12px",fontSize:13,fontWeight:700,cursor:"pointer"}}>+ Scrape</button>
          <button onClick={p.onLogout} style={{background:"transparent",border:"0.5px solid "+dm.border,borderRadius:8,padding:"6px 10px",fontSize:12,color:dm.ts,cursor:"pointer"}}>Sign out</button>
        </div>
      </div>

      <div style={{display:"flex"}}>
        <div style={{width:180,flexShrink:0,borderRight:"0.5px solid "+dm.border,minHeight:"calc(100vh - 52px)",background:dm.nav,padding:"14px 10px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <span style={{fontSize:11,fontWeight:700,color:dm.tt,textTransform:"uppercase",letterSpacing:".05em"}}>Folders</span>
            <button onClick={function(){setFolderModal(true);}} style={{fontSize:20,lineHeight:1,background:"transparent",border:"none",cursor:"pointer",color:dm.ts,padding:0}}>+</button>
          </div>
          {folders.map(function(f){var cnt=f.id==="all"?leads.length:leads.filter(function(l){return l.folderId===f.id;}).length;return(
            <div key={f.id} onClick={function(){setActiveFolder(f.id);setTab("leads");}} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderRadius:8,cursor:"pointer",background:activeFolder===f.id?dm.card2:"transparent",marginBottom:2}}>
              <span style={{width:10,height:10,borderRadius:3,background:f.color,flexShrink:0,display:"inline-block"}}/>
              <span style={{fontSize:13,color:activeFolder===f.id?dm.text:dm.ts,fontWeight:activeFolder===f.id?700:400,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</span>
              <span style={{fontSize:10,color:dm.tt,flexShrink:0}}>{cnt}</span>
              {f.id!=="all"&&<span onClick={function(e){e.stopPropagation();deleteFolder(f.id);}} style={{fontSize:13,color:dm.tt,cursor:"pointer",lineHeight:1,flexShrink:0}}>×</span>}
            </div>
          );})}
        </div>

        <div style={{flex:1,padding:"1.25rem 1.5rem",minWidth:0}}>
          {tab==="dashboard"&&<Dashboard leads={leads} totalCalls={totalCalls} booked={booked} todayAppts={todayAppts} dm={dm}/>}
          {tab==="leads"&&<LeadsView leads={leads} activeFolder={activeFolder} folders={folders} search={search} setSearch={setSearch} fs={fs} setFs={setFs} view={view} setView={setView} updateLead={updateLead} onOpen={function(id){setSelId(id);}} onDial={function(id){setDialId(id);setDialOpen(true);}} onBook={function(id){setCalId(id);setCalOpen(true);}} onFolder={function(l){setMoveFolderLead(l);}} dm={dm}/>}
          {tab==="calendar"&&<CalView leads={leads} dm={dm}/>}
          {tab==="scraper"&&<ScraperView addLeadsBulk={addLeadsBulk} dm={dm} user={user}/>}
          {tab==="calendly"&&<CalendlyView dm={dm} user={user}/>}
          {tab==="notes"&&<NotesView onSave={function(v){setHasNotes(v);}} dm={dm} user={user}/>}
        </div>
      </div>

      {folderModal&&<FolderModal dm={dm} onClose={function(){setFolderModal(false);}} onCreate={function(name,color){addFolder(name,color);setFolderModal(false);}}/>}
      {moveFolderLead&&<MoveFolderModal dm={dm} lead={moveFolderLead} folders={folders} onMove={moveToFolder} onClose={function(){setMoveFolderLead(null);}}/>}
      {selLead&&<LeadModal lead={selLead} onClose={function(){setSelId(null);}} updateLead={updateLead} deleteLead={deleteLead} onDial={function(){setDialId(selLead.id);setDialOpen(true);}} onBook={function(){setCalId(selLead.id);setCalOpen(true);}} dm={dm}/>}
      {dialOpen&&dialLead&&<DialerModal lead={dialLead} onClose={function(){setDialOpen(false);setDialId(null);}} updateLead={updateLead} dm={dm}/>}
      {calOpen&&calLead&&<BookModal lead={calLead} onClose={function(){setCalOpen(false);setCalId(null);}} updateLead={updateLead} dm={dm}/>}
    </div>
  );
}

function Dashboard(p){
  var leads=p.leads;var dm=p.dm;
  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:24}}>
        {[{label:"Total leads",val:leads.length},{label:"Calls logged",val:p.totalCalls},{label:"Booked/Closed",val:p.booked},{label:"Appts today",val:p.todayAppts.length}].map(function(c){return <div key={c.label} style={{background:dm.card2,borderRadius:10,padding:"1rem"}}><p style={{fontSize:12,color:dm.ts,margin:"0 0 6px"}}>{c.label}</p><p style={{fontSize:28,fontWeight:700,color:dm.text,margin:0}}>{c.val}</p></div>;})}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        <div style={{background:dm.card,borderRadius:12,border:"0.5px solid "+dm.border,padding:"1rem 1.25rem"}}>
          <p style={{fontWeight:700,fontSize:14,marginBottom:12,color:dm.text}}>Pipeline overview</p>
          {STAGES.map(function(s){var cnt=leads.filter(function(l){return l.stage===s;}).length;var pct=leads.length?Math.round(cnt/leads.length*100):0;return <div key={s} style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:3}}><span style={{color:dm.ts}}>{s}</span><span style={{color:dm.text,fontWeight:700}}>{cnt}</span></div><div style={{height:6,background:dm.card2,borderRadius:99}}><div style={{height:6,width:pct+"%",background:sc(s),borderRadius:99}}/></div></div>;})}
        </div>
        <div style={{background:dm.card,borderRadius:12,border:"0.5px solid "+dm.border,padding:"1rem 1.25rem"}}>
          <p style={{fontWeight:700,fontSize:14,marginBottom:12,color:dm.text}}>Recent activity</p>

function DialerModal(p){

        {!calling&&!done&&<button onClick={start} style={{width:"100%",padding:"10px",borderRadius:8,border:"none",background:"#1D9E75",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",marginBottom:8}}>Start Call</button>}

  var [saved,setSaved]=useState(false);
  function save(){localStorage.setItem(nk,notes);p.onSave(notes.trim().length>0);setSaved(true);setTimeout(function(){setSaved(false);},2000);}
  return(
    <div style={{background:dm.card,borderRadius:12,border:"0.5px solid "+dm.border,padding:"1.25rem"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <p style={{fontWeight:700,fontSize:14,margin:0,color:dm.text}}>📝 Notes</p>
        <button onClick={save} style={{padding:"6px 16px",borderRadius:8,border:"none",background:saved?"#1D9E75":"#534AB7",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>{saved?"✓ Saved":"Save"}</button>
      </div>
      <textarea value={notes} onChange={function(e){setNotes(e.target.value);setSaved(false);}} placeholder="Call scripts, objection handlers, reminders..." style={{width:"100%",minHeight:520,resize:"vertical",fontFamily:"system-ui,sans-serif",fontSize:14,lineHeight:1.7,borderRadius:8,border:"0.5px solid "+dm.inpB,padding:"12px 14px",background:"#fff",color:"#111",boxSizing:"border-box"}}/>
    </div>
  );
}

function CalendlyView(p){
  var dm=p.dm;var ck=uk(p.user,"calendly");
  var [url,setUrl]=useState(function(){return localStorage.getItem(ck)||"";});
  var [saved,setSaved]=useState(!!localStorage.getItem(ck));
  var [input,setInput]=useState(function(){return localStorage.getItem(ck)||"";});
  function save(){var c=input.trim();if(!c.startsWith("http"))c="https://"+c;localStorage.setItem(ck,c);setUrl(c);setSaved(true);}
  function reset(){localStorage.removeItem(ck);setUrl("");setInput("");setSaved(false);}
  return(
    <div>
      <div style={{background:dm.card,borderRadius:12,border:"0.5px solid "+dm.border,padding:"1.25rem",marginBottom:16}}>
        <p style={{fontWeight:700,fontSize:14,margin:"0 0 4px",color:dm.text}}>📆 Calendly</p>
        <p style={{fontSize:13,color:dm.ts,margin:"0 0 12px"}}>Paste your Calendly link to embed your booking page.</p>
        <div style={{display:"flex",gap:8}}>
          <input value={input} onChange={function(e){setInput(e.target.value);setSaved(false);}} placeholder="https://calendly.com/your-link" style={{flex:1,background:dm.inp,color:dm.text,border:"0.5px solid "+dm.inpB,borderRadius:8,padding:"6px 10px",fontSize:13}}/>
          <button onClick={save} disabled={!input.trim()} style={{padding:"8px 16px",borderRadius:8,border:"none",background:input.trim()?"#534AB7":dm.card2,color:input.trim()?"#fff":dm.tt,fontWeight:700,fontSize:13,cursor:input.trim()?"pointer":"default"}}>{saved?"✓ Saved":"Load"}</button>
          {saved&&<button onClick={reset} style={{padding:"8px 12px",borderRadius:8,border:"0.5px solid "+dm.border,background:"transparent",color:dm.ts,fontSize:13,cursor:"pointer"}}>✕</button>}
        </div>
      </div>
      {saved&&url?<div style={{background:dm.card,borderRadius:12,border:"0.5px solid "+dm.border,overflow:"hidden"}}><iframe src={url} width="100%" height="700" frameBorder="0" title="Calendly" style={{display:"block"}}/></div>:<div style={{background:dm.card2,borderRadius:12,height:280,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8}}><p style={{fontSize:32,margin:0}}>📆</p><p style={{fontSize:13,color:dm.ts,margin:0}}>Enter your Calendly URL above</p></div>}
    </div>
  );
}

function ScraperView(p){
  var dm=p.dm;
  var sk=uk(p.user,"sessions");
  var [backendUrl,setBackendUrl]=useState(function(){return localStorage.getItem(uk(p.user,"backendUrl"))||"";});
  var [showUrlInput,setShowUrlInput]=useState(!localStorage.getItem(uk(p.user,"backendUrl")));
  var [niche,setNiche]=useState("");
  var [city,setCity]=useState("");
  var [loading,setLoading]=useState(false);
  var [results,setResults]=useState([]);
  var [progress,setProgress]=useState("");
  var [sessions,setSessions]=useState(function(){try{return JSON.parse(localStorage.getItem(sk)||"[]");}catch(e){return[];}});
  var [selSess,setSelSess]=useState(null);
  var [error,setError]=useState("");
  var display=selSess!=null?(sessions[selSess]&&sessions[selSess].leads||[]):results;
  var isSess=selSess!=null;

  function saveBackendUrl(url){var u=url.trim().replace(/\/$/,"");localStorage.setItem(uk(p.user,"backendUrl"),u);setBackendUrl(u);setShowUrlInput(false);}

  function scrape(){
    if(!niche||!city||loading)return;
    if(!backendUrl){setError("Enter your backend URL first.");setShowUrlInput(true);return;}
    setLoading(true);setError("");setResults([]);setSelSess(null);setProgress("Fetching real leads from Google Maps...");
    var params=new URLSearchParams({niche:niche,city:city,state:"OH",limit:"60"});
    fetch(backendUrl+"/scrape?"+params.toString())
      .then(function(r){if(!r.ok)return r.json().then(function(d){throw new Error(d.error||"Server error "+r.status);});return r.json();})
      .then(function(data){
        var all=data.leads||[];
        setResults(all);
        setProgress("Done — "+all.length+" real leads from Google Maps");
        var sess={query:niche+" in "+city,date:new Date().toISOString().slice(0,10),count:all.length,leads:all.slice()};
        var ns=[sess].concat(sessions).slice(0,20);setSessions(ns);localStorage.setItem(sk,JSON.stringify(ns));
        p.addLeadsBulk(all.slice());
      })
      .catch(function(err){setError("Error: "+err.message);})
      .finally(function(){setLoading(false);});
  }

  var iS={background:dm.inp,color:dm.text,border:"0.5px solid "+dm.inpB,borderRadius:8,padding:"6px 10px",fontSize:13};
  return(
    <div style={{display:"grid",gridTemplateColumns:"1fr 260px",gap:20}}>
      <div>
        <div style={{background:dm.card,borderRadius:12,border:"0.5px solid "+dm.border,padding:"1.25rem",marginBottom:16}}>
          <p style={{fontWeight:700,fontSize:14,margin:"0 0 4px",color:dm.text}}>🔍 Lead Scraper — Real Google Maps Data</p>
          <p style={{fontSize:12,color:dm.ts,margin:"0 0 14px"}}>Pulls real businesses from Google Maps via your backend.</p>

          <div style={{background:dm.card2,borderRadius:10,padding:"12px 14px",marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
              <p style={{fontSize:12,fontWeight:700,color:dm.text,margin:0}}>🔗 Backend URL</p>
              {backendUrl&&!showUrlInput&&<button onClick={function(){setShowUrlInput(true);}} style={{fontSize:11,color:"#6b8cff",background:"transparent",border:"none",cursor:"pointer"}}>Change</button>}
            </div>
            {showUrlInput?(
              <div style={{display:"flex",gap:8}}>
                <input id="burl" defaultValue={backendUrl} placeholder="https://your-app.railway.app" style={Object.assign({},iS,{flex:1,boxSizing:"border-box"})}/>
                <button onClick={function(){saveBackendUrl(document.getElementById("burl").value);}} style={{padding:"6px 12px",borderRadius:8,border:"none",background:"#534AB7",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>Save</button>
              </div>
            ):(
              <p style={{fontSize:12,color:"#4dde9a",margin:0}}>✓ {backendUrl}</p>
            )}
          </div>

          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            <input value={niche} onChange={function(e){setNiche(e.target.value);}} placeholder="Niche (e.g. HVAC, Roofing, Auto Detail)" style={Object.assign({},iS,{flex:2,minWidth:160})}/>
            <input value={city} onChange={function(e){setCity(e.target.value);}} placeholder="City (e.g. Sandusky)" style={Object.assign({},iS,{flex:1,minWidth:120})}/>
            <button onClick={scrape} disabled={!niche||!city||loading} style={{padding:"8px 18px",borderRadius:8,border:"none",background:(niche&&city&&!loading)?"#534AB7":dm.card2,color:(niche&&city&&!loading)?"#fff":dm.tt,fontWeight:700,fontSize:13,cursor:(niche&&city&&!loading)?"pointer":"default"}}>{loading?"Fetching...":"Scrape"}</button>
          </div>
          {loading&&<p style={{fontSize:12,color:"#a89fff",marginTop:8}}>⏳ {progress}</p>}
          {!loading&&progress&&!error&&<p style={{fontSize:12,color:"#4dde9a",marginTop:8}}>✓ {progress}</p>}
          {error&&<p style={{fontSize:12,color:"#ff6b6b",marginTop:8}}>{error}</p>}
        </div>

        {display.length>0&&(
          <div style={{background:dm.card,borderRadius:12,border:"0.5px solid "+dm.border,overflow:"hidden"}}>
            <div style={{padding:"10px 14px",borderBottom:"0.5px solid "+dm.border,display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
              <span style={{fontSize:13,fontWeight:700,color:dm.text}}>{isSess?sessions[selSess].query+" · "+sessions[selSess].date:display.length+" real leads from Google Maps"}</span>
              {isSess&&<div style={{display:"flex",gap:8}}><button onClick={function(){setSelSess(null);}} style={{fontSize:12,padding:"4px 10px",borderRadius:8,border:"0.5px solid "+dm.border,background:"transparent",cursor:"pointer",color:dm.ts}}>✕ Close</button><button onClick={function(){p.addLeadsBulk(display);setSelSess(null);}} style={{fontSize:12,padding:"4px 12px",borderRadius:8,border:"none",background:"#534AB7",color:"#fff",fontWeight:700,cursor:"pointer"}}>Re-import →</button></div>}
            </div>
            <div style={{maxHeight:520,overflowY:"auto"}}>
              {display.map(function(r,i){return(
                <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",borderBottom:"0.5px solid "+dm.border}}>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{fontSize:13,fontWeight:700,margin:0,color:dm.text}}>{r.name}</p>
                    <p style={{fontSize:12,color:dm.ts,margin:0}}>{r.phone||"No phone listed"}</p>
                    {r.rating&&<p style={{fontSize:11,color:"#f5b942",margin:"2px 0 0"}}>⭐ {r.rating} ({r.reviewCount} reviews)</p>}
                    {r.painPoint&&r.painPoint!=="Could benefit from AI automation"&&<p style={{fontSize:11,color:"#f5b942",margin:"2px 0 0",fontWeight:600}}>⚠ {r.painPoint}</p>}
                    {r.scoreReason&&<p style={{fontSize:11,color:dm.tt,margin:"2px 0 0",fontStyle:"italic"}}>{r.scoreReason}</p>}
                  </div>
                  <div style={{fontSize:12,textAlign:"right",marginRight:8}}>
                    {r.website?<a href={"https://"+r.website} target="_blank" rel="noreferrer" style={{color:"#6b8cff",display:"block",marginBottom:2}}>{r.website}</a>:<p style={{color:"#cc3333",fontStyle:"italic",margin:"0 0 2px",fontSize:11}}>No website</p>}
                    <p style={{margin:"2px 0 0",fontSize:11,color:dm.tt}}>{r.address}</p>
                    {r.mapsUrl&&<a href={r.mapsUrl} target="_blank" rel="noreferrer" style={{fontSize:10,color:"#6b8cff",display:"block",marginTop:2}}>Maps →</a>}
                  </div>
                  <ScoreRing score={r.score!=null?r.score:null}/>
                </div>
              );})}
            </div>
          </div>
        )}
      </div>
      <div>
        <div style={{background:dm.card,borderRadius:12,border:"0.5px solid "+dm.border,padding:"1rem 1.25rem"}}>
          <p style={{fontWeight:700,fontSize:13,margin:"0 0 10px",color:dm.text}}>Scrape sessions</p>
          {sessions.length===0&&<p style={{fontSize:12,color:dm.ts}}>No sessions yet.</p>}
          {sessions.map(function(s,i){return(
            <div key={i} onClick={function(){setSelSess(i);}} style={{fontSize:12,padding:"8px 10px",borderBottom:"0.5px solid "+dm.border,cursor:"pointer",borderRadius:8,background:selSess===i?dm.card2:"transparent"}} onMouseEnter={function(e){e.currentTarget.style.background=dm.card2;}} onMouseLeave={function(e){e.currentTarget.style.background=selSess===i?dm.card2:"transparent";}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:6}}>
                <p style={{fontWeight:700,margin:0,color:dm.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.query}</p>
                <span style={{background:"#2d2a5e",color:"#a89fff",padding:"1px 6px",borderRadius:99,fontSize:10,flexShrink:0}}>{s.count}</span>
              </div>
              <p style={{color:dm.tt,margin:"2px 0 0"}}>{s.date}</p>
            </div>
          );})}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
